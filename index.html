<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drama Course Exams</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient: linear-gradient(to bottom right, #f3e7ff, #dbeafe);
            --container-bg: white;
            --text-color: #1f2937;
            --muted: #6b7280;
            --accent: #9333ea;
            --accent-2: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e5e7eb;
            --exam-card-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --exam-card-text: white;
            --card-bg: #f9fafb;
            --option-border: #d1d5db;
            --option-bg: white;
            --correct-bg: #f0fdf4;
            --incorrect-bg: #fef2f2;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(180deg, #0f263b, #021526);
            --container-bg: #071825;
            --text-color: #dceefb;
            --muted: #9fb6c8;
            --accent: #60a5fa;
            --accent-2: #38bdf8;
            --success: #2dd4bf;
            --danger: #fb7185;
            --border: #123244;
            --card-bg: #071a25;
            --option-border: #123244;
            --option-bg: #071a22;
            --correct-bg: rgba(45,212,191,0.06);
            --incorrect-bg: rgba(251,113,133,0.06);
            --exam-card-bg: linear-gradient(135deg, #082433 0%, #04202b 100%);
            --exam-card-text: #e6f3ff;
            color-scheme: dark;
        }

        [data-theme="dark"] .exam-card {
            background: linear-gradient(135deg, #0f1724 0%, #0b1220 100%);
            color: var(--text-color);
            border-color: transparent;
            box-shadow: 0 6px 12px rgba(2,6,23,0.6);
        }
        [data-theme="dark"] .exam-card:hover { transform: translateY(-4px); border-color: rgba(14,165,255,0.12); }
        [data-theme="dark"] .exam-card p { color: var(--muted); }
        [data-theme="dark"] .option-btn:not(:disabled):hover { border-color: var(--accent); background: rgba(14,165,255,0.04); }
        [data-theme="dark"] .option-btn { background: var(--option-bg); border-color: var(--option-border); color: var(--text-color); }
        [data-theme="dark"] .option-btn.neutral { color: var(--muted); }
        [data-theme="dark"] .option-btn.correct { border-color: #10b981; background: rgba(16,185,129,0.06); color: #c7f7e6; }
        [data-theme="dark"] .option-btn.incorrect { border-color: #ef4444; background: rgba(239,68,68,0.06); color: #ffd6d6; }
        [data-theme="dark"] .explanation-box.correct { background: rgba(6,78,59,0.12); border-color: rgba(16,185,129,0.18); color: var(--text-color); }
        [data-theme="dark"] .explanation-box.incorrect { background: rgba(76,29,29,0.12); border-color: rgba(239,68,68,0.18); color: var(--text-color); }
        [data-theme="dark"] .next-btn { background: linear-gradient(to right, #0ea5ff, #2563eb); color: white; }
        [data-theme="dark"] .results-container .final-score { color: var(--accent); }
        [data-theme="dark"] .category-stats { background: #0b0f12; border-color: #121721; }
        [data-theme="dark"] .stat-item { background: #0d1114; border-color: #121720; color: var(--text-color); }
        [data-theme="dark"] .essay-quote-box { background: rgba(255,255,255,0.04); border-color: var(--accent); color: var(--text-color); }
        [data-theme="dark"] .show-model-btn { background: var(--option-bg); border-color: var(--accent); color: var(--accent); }
        [data-theme="dark"] .show-model-btn:hover { background: var(--accent); color: white; }
        [data-theme="dark"] .essay-reveal-box { background: var(--card-bg); border-color: var(--border); color: var(--text-color); }
        [data-theme="dark"] .para-label { color: var(--accent-2); }

        #theme-toggle {
            position: fixed; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 0.45rem 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer; font-size: 1.125rem;
            z-index: 60; transition: background .2s, color .2s, border-color .2s;
            direction: ltr;
        }
        [data-theme="dark"] #theme-toggle { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.06); color: var(--text-color); }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            transition: background .25s ease, color .25s ease;
        }

        .container {
            max-width: 48rem; width: 100%;
            background: var(--container-bg);
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(2,6,23,0.25), 0 10px 10px -5px rgba(2,6,23,0.12);
            padding: 2rem;
            transition: background .25s ease;
        }

        /* SELECTION */
        .exam-selection { text-align: center; }
        .exam-selection h1 { font-size: 2.5rem; font-weight: bold; color: var(--text-color); margin-bottom: 1rem; }
        .exam-selection p { font-size: 1.25rem; color: var(--muted); margin-bottom: 2rem; }
        .exam-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .exam-card {
            background: var(--exam-card-bg); color: var(--exam-card-text);
            padding: 2rem; border-radius: 1rem; cursor: pointer;
            transition: all 0.3s; border: 3px solid transparent;
            box-shadow: 0 4px 6px -1px rgba(2,6,23,0.22); text-align: left;
        }
        .exam-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); border-color: #fbbf24; }
        .exam-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .exam-card p { font-size: 1rem; color: var(--exam-card-text); }
        .exam-card .question-count { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.3); font-weight: bold; }

        /* HEADER */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; font-weight: bold; color: var(--text-color); }
        .score-info { text-align: end; }
        .score-info .question-number { font-size: 0.875rem; color: var(--muted); }
        .score-info .score { font-weight: bold; color: var(--accent); }

        /* QUESTION */
        .question-container { background: var(--card-bg); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .category { text-align: start; font-weight: bold; font-size: 1.25rem; margin-bottom: 1rem; }
        .question { text-align: start; font-size: 1.125rem; line-height: 1.75; margin-bottom: 1rem; }
        .options { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .option-btn {
            width: 100%; padding: 1.25rem; text-align: start;
            border-radius: 0.75rem; border: 2px solid var(--option-border);
            background: var(--option-bg); font-size: 1.125rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text-color);
        }
        .option-btn:not(:disabled):hover { border-color: var(--accent); background: rgba(147,51,234,0.04); }
        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct { border-color: var(--success); background: var(--correct-bg); color: #065f46; }
        .option-btn.incorrect { border-color: var(--danger); background: var(--incorrect-bg); color: #991b1b; }
        .option-btn.neutral { border-color: var(--option-border); background: var(--card-bg); color: var(--muted); }
        .icon { width: 26px; height: 26px; flex-shrink: 0; }

        /* EXPLANATION */
        .explanation-box { padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem; border: 2px solid; }
        .explanation-box.correct { background: var(--correct-bg); border-color: rgba(16,185,129,0.35); }
        .explanation-box.incorrect { background: var(--incorrect-bg); border-color: rgba(239,68,68,0.28); }
        .explanation-title { text-align: start; font-weight: bold; font-size: 1.25rem; margin-bottom: 0.75rem; }
        .explanation-content { background: var(--option-bg); padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.75rem; }
        .explanation-text { text-align: start; color: var(--text-color); line-height: 1.75; font-size: 1.125rem; }
        .explanation-text strong { color: var(--accent); }
        .topic-info { display: flex; align-items: center; gap: 0.5rem; color: var(--accent); text-align: start; font-weight: 600; }

        .next-btn {
            width: 100%; background: linear-gradient(to right, var(--accent), var(--accent-2));
            color: white; padding: 1rem; border-radius: 0.75rem;
            font-weight: bold; font-size: 1.25rem; border: none;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(2,6,23,0.18);
        }
        .next-btn:hover { filter: brightness(0.98); }

        .current-score { text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 1.125rem; }
        .current-score .score-value { font-weight: bold; color: var(--accent); font-size: 1.25rem; }

        .restart-btn { padding: 0.75rem 1.5rem; background: var(--option-bg); border: 1px solid var(--option-border); border-radius: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-color); }
        .restart-btn:hover { background: var(--card-bg); }
        .back-to-menu-btn { padding: 0.75rem 1.5rem; background: linear-gradient(to right, var(--accent), var(--accent-2)); color: white; border: none; border-radius: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-left: 0.5rem; }
        .back-to-menu-btn:hover { filter: brightness(0.98); }

        /* RESULTS */
        .results-container { text-align: center; }
        .trophy-icon { width: 6rem; height: 6rem; margin: 0 auto 1.5rem; color: #eab308; }
        .results-title { font-size: 2.25rem; font-weight: bold; margin-bottom: 1rem; color: var(--text-color); }
        .final-score { font-size: 4.5rem; font-weight: bold; color: var(--accent); margin-bottom: 0.75rem; }
        .percentage { font-size: 1.875rem; color: var(--muted); margin-bottom: 1rem; }
        .results-message { font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; }
        .category-stats { background: var(--card-bg); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 2rem; }
        .stats-title { font-weight: bold; font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-color); display: flex; align-items: center; gap: 0.5rem; }
        .stat-item { padding: 1rem; background: var(--option-bg); border-radius: 0.75rem; border: 1px solid var(--border); margin-bottom: 0.75rem; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; }
        .stat-category { text-align: start; font-weight: 600; }
        .stat-score { text-align: left; font-weight: bold; }
        .action-buttons { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .btn-primary { flex: 1; background: linear-gradient(to right, var(--accent), var(--accent-2)); color: white; padding: 0.75rem; border-radius: 0.75rem; font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { filter: brightness(0.98); }
        .btn-secondary { flex: 1; border: 2px solid var(--option-border); background: var(--option-bg); padding: 0.75rem; border-radius: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-color); }
        .btn-secondary:hover { background: var(--card-bg); }
        .final-stats { margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--border); padding-top: 1rem; color: var(--muted); font-size: 1.125rem; }
        .final-stats .final-score-value { font-weight: bold; color: var(--accent); font-size: 1.25rem; }

        /* ESSAY */
        .essay-quote-box {
            font-style: italic; font-size: 1.1rem; line-height: 1.8;
            border-left: 4px solid var(--accent);
            padding: 1rem 1.5rem; background: var(--card-bg);
            border-radius: 0 0.75rem 0.75rem 0; margin-bottom: 1.5rem; color: var(--text-color);
        }
        .essay-instructions { font-size: 1rem; color: var(--text-color); line-height: 1.7; margin-bottom: 1.2rem; }
        .essay-instructions li { margin-bottom: 0.5rem; padding-left: 0.3rem; }
        .essay-instructions strong { color: var(--accent); }
        .essay-note { margin-top: 0.8rem; color: var(--muted); font-size: 0.9rem; font-style: italic; }
        .show-model-btn {
            width: 100%; margin-top: 1rem; padding: 1rem;
            background: var(--option-bg); border: 2px solid var(--accent);
            border-radius: 0.75rem; font-size: 1rem; font-weight: bold;
            color: var(--accent); cursor: pointer; transition: all 0.2s;
        }
        .show-model-btn:hover { background: var(--accent); color: white; }
        .essay-reveal-box {
            margin-top: 1.2rem; padding: 1.5rem;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 0.75rem; display: none;
        }
        .essay-reveal-box.show { display: block; }
        .essay-reveal-box h3 { font-size: 1.1rem; color: var(--accent); margin-bottom: 1rem; font-weight: bold; }
        .essay-reveal-box p { font-size: 0.97rem; line-height: 1.75; margin-bottom: 0.8rem; color: var(--text-color); }
        .para-label { font-weight: bold; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent-2); margin-bottom: 0.3rem; }
        .essay-disclaimer { margin-top: 1rem; font-size: 0.85rem; color: var(--muted); font-style: italic; }
    </style>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme" onclick="toggleTheme()">🌙</button>

(function() {
    function applyTheme(t) {
        if (t === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = '☀️';
        } else {
            document.documentElement.removeAttribute('data-theme');
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = '🌙';
        }
    }
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved) { applyTheme(saved); return; }
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        const next = cur === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
    }
    window.toggleTheme = toggleTheme;
    window.initTheme = initTheme;
})();

let state = {

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function shuffleQuestionOptions(question) {
    const opts = question.options.map((opt, idx) => ({ opt, idx }));
    const shuffled = shuffleArray(opts);
    return Object.assign({}, question, {
        options: shuffled.map(s => s.opt),
        correctAnswer: shuffled.findIndex(s => s.idx === question.correctAnswer)
    });
}

// ACTIONS

function selectExam(index) {
    state.selectedExam = index;
    state.essayRevealed = false;
    const exam = examSets[index];
    document.documentElement.setAttribute('lang', 'en');
    document.documentElement.setAttribute('dir', 'ltr');
    if (exam.type === 'essay') { state.screen = 'essay'; render(); return; }
    const questions = exam.questions || [];
    state.initialQuestionCount = questions.length;
    state.selectedQuestions = shuffleArray(questions.slice()).map(q => shuffleQuestionOptions(q));
    state.currentQuestion = 0; state.selectedAnswer = null; state.showExplanation = false;
    state.score = 0; state.quizCompleted = false; state.answers = [];
    state.repeatQueue = []; state.inRepeatPhase = false; state.repeatAnswers = [];
    state.screen = 'quiz';
    render();
}

function getCurrentQuestions() {
    if (state.selectedExam === null) return [];
    return state.selectedQuestions || examSets[state.selectedExam].questions || [];
}

function handleAnswerSelect(answerIndex) {
    if (state.selectedAnswer !== null) return;
    const questions = getCurrentQuestions();
    const question = questions[state.currentQuestion];
    state.selectedAnswer = answerIndex;
    state.showExplanation = true;
    const isCorrect = answerIndex === question.correctAnswer;
    if (!state.inRepeatPhase) {
        if (isCorrect) state.score++;
        else if (!state.repeatQueue.some(q => q.id === question.id)) state.repeatQueue.push(question);
        state.answers.push({ questionId: question.id, correct: isCorrect, category: question.category });
    } else {
        state.repeatAnswers.push({ questionId: question.id, correct: isCorrect });
    }
    render();
}

function handleNext() {
    const questions = getCurrentQuestions();
    if (state.currentQuestion < questions.length - 1) {
        state.currentQuestion++; state.selectedAnswer = null; state.showExplanation = false;
    } else {
        if (!state.inRepeatPhase && state.repeatQueue.length > 0) {
            state.selectedQuestions = state.repeatQueue.slice(); state.repeatQueue = [];
            state.inRepeatPhase = true; state.currentQuestion = 0;
            state.selectedAnswer = null; state.showExplanation = false;
        } else { state.quizCompleted = true; }
    }
    render();
}

function handleRestart() {
    const exam = examSets[state.selectedExam];
    if (exam.type === 'essay') { state.essayRevealed = false; state.screen = 'essay'; render(); return; }
    if (state.selectedExam !== null) {
        const questions = exam.questions || [];
        state.initialQuestionCount = questions.length;
        state.selectedQuestions = shuffleArray(questions.slice()).map(q => shuffleQuestionOptions(q));
    }
    state.currentQuestion = 0; state.selectedAnswer = null; state.showExplanation = false;
    state.score = 0; state.quizCompleted = false; state.answers = [];
    state.repeatQueue = []; state.inRepeatPhase = false; state.repeatAnswers = [];
    render();
}

function backToMenu() {
    document.documentElement.setAttribute('lang', 'en');
    document.documentElement.setAttribute('dir', 'ltr');
    state = {
        screen: 'selection', selectedExam: null,
        selectedQuestions: [], initialQuestionCount: 0,
        currentQuestion: 0, selectedAnswer: null,
        showExplanation: false, score: 0, quizCompleted: false,
        answers: [], repeatQueue: [], inRepeatPhase: false,
        repeatAnswers: [], essayRevealed: false
    };
    render();
}

function toggleEssayReveal() {
    state.essayRevealed = !state.essayRevealed;
    render();
}

    else { message = "You need more review and practice"; colorClass = "color: #ea580c;"; }
    const categoryStats = {};
    state.answers.forEach(answer => {
        if (!categoryStats[answer.category]) categoryStats[answer.category] = { correct: 0, total: 0 };
        categoryStats[answer.category].total++;
        if (answer.correct) categoryStats[answer.category].correct++;
    });
    const statsHTML = Object.entries(categoryStats).map(([cat, stats]) => {
        const pct = Math.round((stats.correct / stats.total) * 100);
        return `<div class="stat-item"><div class="stat-row"><div class="stat-category">${cat}</div><div class="stat-score">${stats.correct}/${stats.total} (${pct}%)</div></div></div>`;
    }).join('');
    return `
        <div class="results-container">
            ${icons.award}
            <h2 class="results-title">Quiz Completed!</h2>
            <div class="final-score">${state.score}/${total}</div>
            <div class="percentage">Percentage: ${percentage}%</div>
            <p class="results-message" style="${colorClass}">${message}</p>
            <div class="category-stats">
                <h3 class="stats-title">${icons.bookOpen} Your Performance by Topics:</h3>
                ${statsHTML.length > 0 ? statsHTML : '<p style="text-align:center;color:#6b7280;">No answers recorded.</p>'}
                <div class="action-buttons">
                    <button class="btn-primary" onclick="handleRestart()">Try Again</button>
                    <button class="btn-secondary" onclick="backToMenu()">Back to Main Menu</button>
                </div>
                <div class="final-stats"><p>Final Score: <span class="final-score-value">${state.score}</span></p></div>
            </div>
        </div>`;
}

function renderQuestion() {
    const questions = getCurrentQuestions();
    const question = questions[state.currentQuestion];
    const examTitle = examSets[state.selectedExam].title;
    const mainTotal = state.initialQuestionCount || questions.length;
    const questionNumberText = state.inRepeatPhase
        ? `Review Question ${state.currentQuestion + 1} of ${questions.length}`
        : `Question ${state.currentQuestion + 1} of ${mainTotal}`;
    const optionsHTML = question.options.map((option, index) => {
        let btnClass = "option-btn", iconHTML = "";
        if (state.selectedAnswer !== null) {
            if (index === question.correctAnswer) { btnClass += " correct"; iconHTML = icons.checkCircle; }
            else if (index === state.selectedAnswer) { btnClass += " incorrect"; iconHTML = icons.xCircle; }
            else btnClass += " neutral";
        }
        return `<button class="${btnClass}" onclick="handleAnswerSelect(${index})" ${state.selectedAnswer !== null ? 'disabled' : ''}>
            <span style="text-align:start;line-height:1.75;">${option}</span>${iconHTML}
        </button>`;
    }).join('');
    const explanationHTML = state.showExplanation ? `
        <div class="explanation-box ${state.selectedAnswer === question.correctAnswer ? 'correct' : 'incorrect'}">
            <p class="explanation-title">${state.selectedAnswer === question.correctAnswer ? '✅ Correct Answer! Excellent' : '❌ Incorrect Answer'}</p>
            <div class="explanation-content">
                <p class="explanation-text"><strong>Detailed Explanation:</strong><br>${question.explanation}</p>
            </div>
            <div class="topic-info">${icons.bookOpen}<p><strong>Review:</strong> ${question.topic}</p></div>
        </div>
        <button class="next-btn" onclick="handleNext()">
            ${state.currentQuestion < questions.length - 1 ? 'Next Question' : 'End Quiz and Show Results 🎉'}
        </button>` : '';
    return `
        <div class="header">
            <h1>${examTitle}</h1>
            <div class="score-info">
                <div class="question-number">${questionNumberText}</div>
                <div class="score">Score: ${state.score}</div>
            </div>
        </div>
        <div class="question-container">
            <h2 class="category">${question.category}</h2>
            <p class="question">${question.question}</p>
            <div class="options">${optionsHTML}</div>
            ${explanationHTML}
            <div class="current-score">
                <p>Current Score: <span class="score-value">${state.score}</span> From ${state.currentQuestion + (state.selectedAnswer !== null ? 1 : 0)}</p>
            </div>
        </div>
        <div style="text-align:center;">
            <button class="restart-btn" onclick="handleRestart()">Restart</button>
            <button class="back-to-menu-btn" onclick="backToMenu()">Main Menu</button>
        </div>`;
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'selection') app.innerHTML = renderExamSelection();
    else if (state.screen === 'essay') app.innerHTML = renderEssay();
    else if (state.quizCompleted) app.innerHTML = renderResults();
    else app.innerHTML = renderQuestion();
}

window.selectExam = selectExam;
window.handleAnswerSelect = handleAnswerSelect;
window.handleNext = handleNext;
window.handleRestart = handleRestart;
window.backToMenu = backToMenu;
window.toggleEssayReveal = toggleEssayReveal;

initTheme();
render();
</script>
</body>
</html>
